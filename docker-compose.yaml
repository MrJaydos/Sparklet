# Coolify stack: app + Postgres.
# Coolify injects env vars defined in its UI; see .env.example for the list.
services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://sparklet:${POSTGRES_PASSWORD}@db:5432/sparklet
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_TRUST_HOST: "true"
      EMAIL_SERVER: ${EMAIL_SERVER}
      EMAIL_FROM: ${EMAIL_FROM}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      # AI keys on the server enable: import-time fact-check + embedding
      # dedup, and lazy depth-variant generation. All degrade gracefully
      # when unset.
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      # Topical GIF fallback for cards with no Wikipedia image. Unset = those
      # cards simply have no image (previous behavior).
      GIPHY_API_KEY: ${GIPHY_API_KEY}
      REVALIDATE_TOKEN: ${REVALIDATE_TOKEN}
      # Web Push (PWA reminders). Unset = reminders UI hidden, nudges no-op.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      # Only migrations + category seed block `next start` now; the content
      # import happens in the background after the server is up.
      start_period: 60s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sparklet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sparklet
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparklet -d sparklet"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
