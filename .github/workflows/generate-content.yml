name: Scheduled content top-up

on:
  schedule:
    # 17:00 UTC ≈ 5-6am NZ time, daily
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Cards per category (overrides TOPUP_COUNT)"
        required: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Inventory-based, judged via the live app's /api/inventory endpoint.
      # A category is topped up when its published STANDARD-card count falls
      # under max(MIN_BANK, most-active-reader's seen count + TOPUP_HEADROOM),
      # so categories people actually read keep growing past the base floor.
      - name: Generate cards for low-inventory categories
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          MIN_BANK: ${{ vars.MIN_BANK || '40' }}
          TOPUP_COUNT: ${{ github.event.inputs.count || vars.TOPUP_COUNT || '10' }}
          TOPUP_HEADROOM: ${{ vars.TOPUP_HEADROOM || '15' }}
        run: npm run generate:content -- --top-up

      # Pushing to main triggers Coolify's webhook; the deploy's start command
      # runs the seed importer, which fact-checks URLs before publishing.
      - name: Commit new content
        run: |
          git config user.name "sparklet-content-bot"
          git config user.email "actions@github.com"
          git add content/generated
          if git diff --cached --quiet; then
            echo "No new content to commit."
          else
            git commit -m "content: scheduled top-up $(date -u +%Y-%m-%d)"
            # Rebase over anything pushed to main while generation ran —
            # content files are uniquely timestamped, so this can't conflict.
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "Push attempt $i failed, retrying…"
              sleep 10
            done
          fi
