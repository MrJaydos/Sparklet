name: Push nudges

on:
  schedule:
    # Every 2 hours; the endpoint itself decides per user whether it's
    # their local evening and whether they've already been nudged/active
    # today, so most calls are cheap no-ops.
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  nudge:
    runs-on: ubuntu-latest
    steps:
      - name: Send due nudges
        env:
          APP_URL: ${{ secrets.APP_URL }}
          REVALIDATE_TOKEN: ${{ secrets.REVALIDATE_TOKEN }}
        run: |
          status=$(curl -s -o resp.json -w "%{http_code}" -X POST "$APP_URL/api/admin/nudge" \
            -H "Authorization: Bearer $REVALIDATE_TOKEN")
          cat resp.json; echo
          if [ "$status" != "200" ]; then
            echo "Nudge endpoint returned HTTP $status (401 usually means REVALIDATE_TOKEN is missing/mismatched in the app's server env)."
            exit 1
          fi
